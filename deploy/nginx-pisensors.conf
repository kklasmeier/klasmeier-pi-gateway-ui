# PiSensors: public port 8000 — camera API + gateway UI
# Install: sudo cp deploy/nginx-pisensors.conf /etc/nginx/sites-available/pivpngateway
#          sudo ln -sf /etc/nginx/sites-available/pivpngateway /etc/nginx/sites-enabled/
# Camera API must listen on 127.0.0.1:8002 (see Security-Camera-Central .env)

server {
    listen 8000;
    listen [::]:8000;
    server_name _;

    location /gateway/ {
        proxy_pass http://127.0.0.1:8001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /gateway {
        return 301 /gateway/;
    }

    location /home-vpn/ {
        proxy_pass http://127.0.0.1:8001/home-vpn/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /home-vpn {
        return 301 /home-vpn/;
    }

    location / {
        proxy_pass http://127.0.0.1:8002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
